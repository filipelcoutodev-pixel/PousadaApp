<html lang="pt-BR" xmlns="http://w3.org" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4 shadow" style="width: 400px;">
        <h3 class="text-center mb-3">Criar Conta</h3>
        <form th:action="@{/cadastro}" th:object="${usuario}" method="post">
            <div class="mb-3">
                <label class="form-label">Nome</th:label>
                <input type="text" th:field="*{nome}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Login</label>
                <input type="text" th:field="*{login}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" th:field="*{senha}" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
        </form>
        <p class="text-center mt-3"><a href="/login">Já tem conta? Entrar</a></p>
    </div>
</body>
</html>
