<html lang="pt-BR" xmlns="http://w3.org" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4 shadow" style="width: 400px;">
        <h3 class="text-center mb-3">Login</h3>
        
        <div th:if="${param.error}" class="alert alert-danger">Login ou senha inválidos.</div>
        <div th:if="${param.sucesso}" class="alert alert-success">Cadastro realizado com sucesso!</div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Login</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Entrar</button>
        </form>
        <p class="text-center mt-3"><a href="/cadastro">Não tem conta? Cadastre-se</a></p>
    </div>
</body>
</html>
